services:
  - type: web
    name: mc-enterprise
    env: static
    buildCommand: ""
    staticPublishPath: .
    headers:
      - path: /sitemap.xml
        name: Content-Type
        value: application/xml; charset=utf-8
      - path: /robots.txt
        name: Content-Type
        value: text/plain; charset=utf-8
    routes:
      - type: rewrite
        source: /sitemap.xml
        destination: /sitemap.xml
      - type: rewrite
        source: /robots.txt
        destination: /robots.txt
      - type: rewrite
        source: /*
        destination: /index.html
